<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Occ3D free-space 정직 뷰어</title>
<style>
  html,body{margin:0;height:100%;background:#0b0d12;color:#e6e9ef;
    font-family:ui-sans-serif,system-ui,sans-serif;overflow:hidden}
  #hud{position:fixed;top:14px;left:14px;z-index:10;background:rgba(16,19,26,.85);
    border:1px solid #262b36;border-radius:10px;padding:13px 15px;max-width:360px;font-size:12.5px;line-height:1.5}
  #hud h1{margin:0 0 8px;font-size:14px;letter-spacing:-.01em}
  #hud .row{display:flex;justify-content:space-between;gap:12px;margin:2px 0}
  #hud b{font-variant-numeric:tabular-nums}
  .k{color:#8b93a1}
  .big{font-size:15px}
  .g{color:#26d07c} .a{color:#ffb020} .r{color:#ff5470}
  .legend{margin-top:10px;padding-top:9px;border-top:1px solid #262b36}
  .legend div{display:flex;align-items:center;gap:7px;margin:3px 0}
  .sw{width:12px;height:12px;border-radius:3px;flex:none}
  .msg{margin-top:10px;padding:8px 10px;background:#20161f;border:1px solid #4a2740;border-radius:7px;color:#e79bc4}
  .msg b{color:#fff}
  #controls{position:fixed;bottom:14px;left:14px;z-index:10;font-size:12px;color:#6b7280}
  #controls button{background:#1a1e28;color:#cbd2dc;border:1px solid #2b3140;border-radius:6px;
    padding:5px 10px;font-size:12px;cursor:pointer;margin-right:6px}
  #controls button.on{background:#4f46e5;color:#fff;border-color:#4f46e5}
</style>
</head>
<body>
<div id="hud">
  <h1>Occ3D free-space 정직 뷰어</h1>
  <div class="row"><span class="k">scene</span><b id="scene">…</b></div>
  <div class="row big"><span class="k">누적맵 clearance</span><b class="a" id="agg">…</b></div>
  <div class="row big"><span class="k">단일스윕이 확인한 free</span><b class="g" id="conf">…</b></div>
  <div class="legend">
    <div><span class="sw" style="background:linear-gradient(#2b6b3f,#8a95a3)"></span> corridor 바닥 = 관측-free 비율 (초록=확인, 회색=안개)</div>
    <div><span class="sw" style="background:#ff5470"></span> 누적맵상 가장 가까운 장애물 (clearance)</div>
    <div><span class="sw" style="background:#26d07c;border:1px solid #26d07c"></span> ego 차 · <span class="sw" style="background:#00e5ff"></span> 단일스윕 확인점</div>
  </div>
  <div class="msg" id="msg">…</div>
</div>
<div id="controls">
  드래그=회전 · 휠=줌 &nbsp;|&nbsp;
  <button id="tObst" class="on">지형 mesh</button>
  <button id="tCorr" class="on">corridor 확신도</button>
  <button id="tObs">단일스윕 점</button>
</div>

<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './jsm/controls/OrbitControls.js';

const d = await (await fetch('./mesh.json')).json();
const cor = d.corridor;
document.getElementById('scene').textContent = d.scene;
document.getElementById('agg').textContent = (cor.aggregated_clearance ?? '—') + ' m';
document.getElementById('conf').textContent = (cor.confirmed_free_to ?? cor.horizon) + ' m';
const unkPct = (d.unknown_frac_single_sweep*100).toFixed(0);
document.getElementById('msg').innerHTML =
  `누적맵은 <b>${cor.aggregated_clearance} m</b>까지 길이 뚫려 있다고 함. 그러나 한 번의 LiDAR 스윕은 `+
  `<b>${cor.confirmed_free_to} m</b>까지만 "빈 것"을 확인함 — 그 뒤는 <b>안개(unknown)</b>. `+
  `이 씬의 ${unkPct}%가 미관측. 회색 바닥 = 사람/에이전트가 "여긴 아직 못 봤다"를 알아야 하는 곳.`;

const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0b0d12);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 4000);
camera.up.set(0,0,1); camera.position.set(-20,-16,15);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.target.set(8,0,1);
scene.add(new THREE.HemisphereLight(0xbfd3ff, 0x20242e, 1.15));
const dl = new THREE.DirectionalLight(0xffffff,0.6); dl.position.set(-1,-1,2); scene.add(dl);
const grid = new THREE.GridHelper(160,40,0x223,0x161922); grid.rotation.x=Math.PI/2; scene.add(grid);

// --- obstacle terrain mesh (height-colored) ---
const ob = d.obstacles, verts=ob.verts, faces=ob.faces, fz=ob.face_z;
const zs=fz.slice().sort((a,b)=>a-b), zlo=zs[(zs.length*0.02)|0], zhi=zs[(zs.length*0.98)|0];
const pos=[],col=[],c=new THREE.Color();
for(let i=0;i<faces.length;i++){const[a,b,cc,dd]=faces[i];
  const t=Math.min(1,Math.max(0,(fz[i]-zlo)/(zhi-zlo+1e-6)));
  c.setHSL(0.60-0.60*t,0.62,0.42+0.13*t);
  for(const idx of [a,b,cc,a,cc,dd]){pos.push(verts[idx][0],verts[idx][1],verts[idx][2]);col.push(c.r,c.g,c.b);}}
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
geo.computeVertexNormals();
const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.96,flatShading:true,side:THREE.DoubleSide}));
scene.add(mesh);

// --- corridor floor tiles, colored by observed-free fraction (confidence) ---
const corrGroup=new THREE.Group(); scene.add(corrGroup);
// Two-region corridor volume — reads from any angle:
//   GREEN box  [0 .. confirmed_free_to]     = single sweep CONFIRMS clear (safe)
//   GREY  box  [confirmed_free_to .. obstacle] = FOG (unknown — "here be dragons")
const hw=cor.half_width, H=2.4;
function slab(x0, x1, color, op){
  const len=Math.max(0.01, x1-x0);
  const m=new THREE.Mesh(new THREE.BoxGeometry(len, hw*2, H),
    new THREE.MeshBasicMaterial({color, transparent:true, opacity:op, depthWrite:false}));
  m.position.set((x0+x1)/2, 0, H/2); corrGroup.add(m);
  const e=new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({color, transparent:true, opacity:0.6}));
  e.position.copy(m.position); corrGroup.add(e);
  return m;
}
const cfree = cor.confirmed_free_to ?? 0;
const obX = cor.aggregated_clearance ?? cor.horizon;
if(cfree > 0.01) slab(0, cfree, 0x2ee27f, 0.30);          // confirmed clear
slab(cfree, obX, 0x9fb0c8, 0.16);                          // fog to the obstacle
// floor strip under the fog for extra legibility (grey haze on the ground)
const floor=new THREE.Mesh(new THREE.PlaneGeometry(obX-cfree, hw*2),
  new THREE.MeshBasicMaterial({color:0x9fb0c8, transparent:true, opacity:0.14, side:THREE.DoubleSide, depthWrite:false}));
floor.position.set((cfree+obX)/2, 0, 0.05); corrGroup.add(floor);
// markers: where the sensor stops confirming free, and the aggregated obstacle
if(cor.confirmed_free_to!=null){
  const wall=new THREE.Mesh(new THREE.PlaneGeometry(hw*2, 3),
    new THREE.MeshBasicMaterial({color:0xffb020,transparent:true,opacity:0.25,side:THREE.DoubleSide}));
  wall.rotation.y=Math.PI/2; wall.position.set(cor.confirmed_free_to,0,1.5); corrGroup.add(wall);
}
if(cor.aggregated_clearance!=null){
  const sph=new THREE.Mesh(new THREE.SphereGeometry(0.6,16,12),new THREE.MeshBasicMaterial({color:0xff5470}));
  sph.position.set(cor.aggregated_clearance,0,1.0); corrGroup.add(sph);
}

// --- ego + single-sweep confirmed points ---
const ego=new THREE.Mesh(new THREE.BoxGeometry(4.5,2,1.6),new THREE.MeshBasicMaterial({color:0x26d07c,wireframe:true}));
ego.position.set(0,0,0.8); scene.add(ego);
const op=new Float32Array(d.observed.length*3);
d.observed.forEach((p,i)=>{op[i*3]=p[0];op[i*3+1]=p[1];op[i*3+2]=p[2];});
const og=new THREE.BufferGeometry(); og.setAttribute('position',new THREE.BufferAttribute(op,3));
const obsPts=new THREE.Points(og,new THREE.PointsMaterial({color:0x00e5ff,size:0.2})); obsPts.visible=false; scene.add(obsPts);

const bind=(id,obj)=>{const b=document.getElementById(id);b.onclick=()=>{obj.visible=!obj.visible;b.classList.toggle('on',obj.visible);};};
bind('tObst',mesh); bind('tCorr',corrGroup); bind('tObs',obsPts);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
(function loop(){requestAnimationFrame(loop);controls.update();renderer.render(scene,camera);})();
</script>
</body>
</html>
